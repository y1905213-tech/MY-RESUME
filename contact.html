<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Yashwanth M</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1em;
            opacity: 0.9;
        }

        main {
            padding: 40px;
        }

        .contact-section {
            margin-bottom: 30px;
        }

        .contact-section h2 {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f7ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .contact-icon {
            font-size: 1.5em;
            margin-right: 15px;
            color: #667eea;
            min-width: 30px;
        }

        .contact-info {
            flex: 1;
        }

        .contact-info a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        .contact-info p {
            margin: 5px 0;
            color: #555;
        }

        .address {
            white-space: pre-line;
        }

        .back-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 20px;
        }

        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        footer {
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
            color: #666;
            border-top: 1px solid #eee;
        }

        @media (max-width: 600px) {
            header {
                padding: 40px 20px;
            }

            header h1 {
                font-size: 1.6em;
            }

            main {
                padding: 20px;
            }

            .contact-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .contact-icon {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Contact Me</h1>
            <p>Get in touch with me</p>
        </header>

        <main>
            <div class="contact-section">
                <h2>📞 Phone</h2>
                <div class="contact-item">
                    <div class="contact-icon">☎️</div>
                    <div class="contact-info">
                        <p><a href="tel:+123456789">+123456789</a></p>
                    </div>
                </div>
            </div>

            <div class="contact-section">
                <h2>✉️ Email</h2>
                <div class="contact-item">
                    <div class="contact-icon">📧</div>
                    <div class="contact-info">
                        <p><a href="mailto:me@gmail.com">me@gmail.com</a></p>
                    </div>
                </div>
            </div>

            <div class="contact-section">
                <h2>📍 Address</h2>
                <div class="contact-item">
                    <div class="contact-icon">📌</div>
                    <div class="contact-info">
                        <p class="address">123 North Street
Some City
Some Country</p>
                    </div>
                </div>
            </div>

            <a href="./index.html" class="back-link">← Back to Home</a>
        </main>

        <footer>
            <p>&copy; 2025 Yashwanth M. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
